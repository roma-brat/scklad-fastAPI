{% extends "base.html" %}

{% block title %}ОТК - Электронные маршрутные карты{% endblock %}

{% block content %}
<div class="bg-white border-b border-gray-200 px-6 py-4">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">
                <i class="fas fa-clipboard-check mr-2 text-purple-600"></i>ОТК - Маршрутные карты
            </h1>
            <p class="text-gray-600 mt-1">Запланированные заказы для контроля</p>
        </div>
        <div class="flex gap-2">
            <a href="/otk" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-700">
                <i class="fas fa-arrow-left mr-2"></i>Назад
            </a>
        </div>
    </div>
</div>

<div class="p-6">
    <!-- Orders List -->
    <div id="orders-container" class="space-y-4">
        <div class="text-center py-8 text-gray-500">
            <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
            <p>Загрузка заказов...</p>
        </div>
    </div>
</div>

<script>
async function loadOrders() {
    try {
        const response = await fetch('/api/otk/orders');
        console.log('Response status:', response.status);
        const result = await response.json();
        console.log('API result:', result);
        
        if (!result.success) {
            document.getElementById('orders-container').innerHTML = `
                <div class="text-center py-8 text-red-500">
                    <p>Ошибка: ${result.message}</p>
                </div>
            `;
            return;
        }
        
        const orders = result.orders || [];
        console.log('Orders count:', orders.length);
        console.log('Orders:', orders);
        renderOrders(orders);
    } catch (e) {
        console.error(e);
        document.getElementById('orders-container').innerHTML = `
            <div class="text-center py-8 text-red-500">
                <p>Ошибка загрузки: ${e.message}</p>
            </div>
        `;
    }
}

function renderOrders(orders) {
    const container = document.getElementById('orders-container');
    
    console.log('Rendering orders:', orders);
    
    if (orders.length === 0) {
        container.innerHTML = `
            <div class="bg-white rounded-lg shadow p-12 text-center">
                <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
                <p class="text-gray-600 text-lg">Нет запланированных заказов</p>
                <p class="text-gray-500 text-sm mt-2">Заказы со статусом "Запланировано" и производственным планом появятся здесь</p>
                <p class="text-gray-400 text-xs mt-4">Проверьте: заказы должны иметь статус "Запланировано", "В работе" или "Задержка"</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = orders.map(order => `
        <div class="bg-white rounded-lg shadow p-4 border-l-4 
            ${order.status === 'В работе' ? 'border-l-blue-500' : 
              order.status === 'Задержка' ? 'border-l-red-500' : 'border-l-green-500'}">
            <div class="flex items-center justify-between">
                <div class="flex-1">
                    <div class="flex items-center gap-3">
                        <h3 class="text-lg font-bold text-gray-900">
                            ${order.designation || 'Без обозначения'}
                        </h3>
                        <span class="px-2 py-0.5 rounded text-xs font-medium
                            ${order.status === 'В работе' ? 'bg-blue-100 text-blue-800' : 
                              order.status === 'Задержка' ? 'bg-red-100 text-red-800' : 
                              'bg-green-100 text-green-800'}">
                            ${order.status || 'Запланировано'}
                        </span>
                    </div>
                    <p class="text-gray-600 text-sm">${order.detail_name || ''}</p>
                    <div class="mt-2 flex items-center gap-4 text-sm text-gray-500">
                        <span><i class="fas fa-hashtag mr-1"></i>ШТ-${order.order_number || order.id}</span>
                        <span><i class="fas fa-box mr-1"></i>${order.quantity || 1} шт.</span>
                        ${order.mark_name ? `<span><i class="fas fa-cubes mr-1"></i>${order.mark_name}</span>` : ''}
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <a href="/orders/${order.id}/card" 
                       class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">
                        <i class="fas fa-clipboard-list mr-2"></i>ЭМК
                    </a>
                </div>
            </div>
        </div>
    `).join('');
}

loadOrders();
</script>
{% endblock %}
