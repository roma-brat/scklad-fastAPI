<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="color-scheme" content="light">
    <title>Вход | Склад Инструментов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/mobile/css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <!-- Header -->
        <div class="login-header">
            <i class="fas fa-warehouse logo-icon"></i>
            <h1>Склад Инструментов</h1>
            <p>Войдите для продолжения работы</p>
        </div>

        <!-- Error/Success Messages -->
        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            {{ error }}
        </div>
        {% endif %}

        {% if success_message %}
        <div class="success-message">
            <i class="fas fa-check-circle"></i>
            {{ success_message }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" action="/mobile/login" class="login-form">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i>
                    Логин или Фамилия
                </label>
                <input type="text"
                       id="username"
                       name="username"
                       value="{{ username or '' }}"
                       required
                       autocomplete="username"
                       autocapitalize="none"
                       placeholder="Введите логин или фамилию">
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i>
                    Пароль
                </label>
                <div class="password-input">
                    <input type="password"
                           id="password"
                           name="password"
                           required
                           autocomplete="current-password"
                           placeholder="Введите пароль">
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="password-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                <i class="fas fa-sign-in-alt"></i>
                Войти
            </button>
        </form>

        <!-- Footer Links -->
        <div class="login-footer">
            <a href="/register" class="footer-link">
                <i class="fas fa-user-plus"></i>
                Зарегистрироваться
            </a>
            <a href="/login" class="footer-link footer-desktop">
                <i class="fas fa-desktop"></i>
                Десктоп версия
            </a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('password-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
