<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <title>Вход | Склад Инструментов</title>
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/tailwind-built.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
</head>
<body class="h-full flex items-center justify-center" style="background-color: #ffffff; color: #1a1a1a;">

    <div class="max-w-md w-full bg-white rounded-xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <i class="fas fa-warehouse text-6xl text-accent mb-4"></i>
            <h1 class="text-2xl font-bold text-gray-900">Склад Инструментов</h1>
            <p class="text-gray-600 mt-2">Войдите для продолжения работы</p>
        </div>

        {% if error_message %}
        <div class="bg-error-bg border border-error-border text-error px-4 py-3 rounded-lg mb-4">
            <i class="fas fa-exclamation-circle mr-2"></i>{{ error_message }}
        </div>
        {% endif %}

        {% if success_message %}
        <div class="bg-success-bg border border-success-border text-success px-4 py-3 rounded-lg mb-4">
            <i class="fas fa-check-circle mr-2"></i>{{ success_message }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-2">
                    <i class="fas fa-user mr-1"></i>Логин или Фамилия
                </label>
                <input type="text"
                       name="login"
                       value="{{ login if login else '' }}"
                       required
                       class="w-full px-4 py-2 border border-gray-200 bg-white text-gray-900 rounded-lg focus:ring-2 focus:ring-accent focus:border-transparent"
                       placeholder="Введите логин или фамилию">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-2">
                    <i class="fas fa-lock mr-1"></i>Пароль
                </label>
                <input type="password"
                       name="password"
                       required
                       class="w-full px-4 py-2 border border-gray-200 bg-white text-gray-900 rounded-lg focus:ring-2 focus:ring-accent focus:border-transparent"
                       placeholder="Введите пароль">
            </div>

            <button type="submit"
                    class="w-full bg-accent hover:bg-accent-hover text-white font-medium py-2 px-4 rounded-lg transition duration-200">
                <i class="fas fa-sign-in-alt mr-2"></i>Войти
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/register" class="text-accent hover:text-accent-hover text-sm">
                <i class="fas fa-user-plus mr-1"></i>Зарегистрироваться
            </a>
        </div>

        <div class="mt-4 text-center">
            <a href="/mobile/login" class="text-gray-600 hover:text-gray-900 text-sm">
                📱 Мобильная версия
            </a>
        </div>
    </div>
</body>
</html>
