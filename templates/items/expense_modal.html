<!-- Expense Modal -->
<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
     x-data="{ open: true }"
     x-show="open"
     x-transition
     @click.self="open = false; setTimeout(() => $el.remove(), 300)">

    <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
        <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
            <h2 class="text-xl font-bold text-red-700">
                <i class="fas fa-minus-circle mr-2"></i>Расход товара
            </h2>
            <button @click="open = false; setTimeout(() => $el.closest('.fixed').remove(), 300)"
                    class="text-gray-400 hover:text-gray-600text-gray-300">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <form hx-post="/items/{{ item.item_id }}/expense"
              hx-target="#modal-container"
              class="p-6 space-y-4">

            <div>
                <p class="text-sm text-gray-600 mb-1">Товар</p>
                <p class="font-semibold text-gray-900">{{ item.name }}</p>
                <p class="text-sm text-gray-500">ID: {{ item.item_id }}</p>
                <p class="text-sm text-gray-500">Доступно: <span class="font-bold text-green-600">{{ item.quantity }}</span></p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Количество</label>
                <input type="number"
                       name="quantity"
                       required
                       min="1"
                       max="{{ item.quantity }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 bg-white text-gray-900"
                       placeholder="Введите количество">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Детали / Примечание</label>
                <textarea name="detail"
                          rows="2"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 bg-white text-gray-900"
                          placeholder="Кому выдано, номер заказа"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Причина</label>
                <input type="text"
                       name="reason"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 bg-white text-gray-900"
                       placeholder="Выдача в производство, брак и т.д.">
            </div>

            <div class="flex space-x-3">
                <button type="submit"
                        class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700bg-red-600">
                    <i class="fas fa-check mr-2"></i>Провести расход
                </button>
                <button type="button"
                        @click="open = false; setTimeout(() => $el.closest('.fixed').remove(), 300)"
                        class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                    Отмена
                </button>
            </div>
        </form>
    </div>
</div>
