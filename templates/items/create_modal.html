<!-- Create Item Modal -->
<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
     x-data="{
         open: true,
         itemId: '',
         idExists: false,
         idExistsName: '',
         idCheckTimeout: null,
         isChecking: false,

         checkId() {
             const normalized = this.itemId.replace(/\s/g, '');
             if (!normalized) {
                 this.idExists = false;
                 this.idExistsName = '';
                 this.isChecking = false;
                 return;
             }
             this.isChecking = true;
             clearTimeout(this.idCheckTimeout);
             this.idCheckTimeout = setTimeout(async () => {
                 try {
                     const response = await fetch(`/items/check-id?item_id=${encodeURIComponent(this.itemId)}`);
                     const data = await response.json();
                     this.idExists = data.exists;
                     this.idExistsName = data.item_name || '';
                 } catch (e) {
                     console.error('Check ID error:', e);
                 } finally {
                     this.isChecking = false;
                 }
             }, 400);
         },

         get submitDisabled() {
             const normalized = this.itemId.replace(/\s/g, '');
             return !normalized || this.idExists || this.isChecking;
         }
     }"
     x-show="open"
     x-transition
     @click.self="open = false; setTimeout(() => $el.remove(), 300)">

    <div class="bg-white rounded-lg shadow-xl max-w-lg w-full mx-4">
        <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
            <h2 class="text-xl font-bold text-green-700">
                <i class="fas fa-plus-circle mr-2"></i>Новый товар
            </h2>
            <button @click="open = false; setTimeout(() => $el.closest('.fixed').remove(), 300)"
                    class="text-gray-400 hover:text-gray-600text-gray-300">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <form hx-post="/items/create"
              hx-target="#modal-container"
              class="p-6 space-y-4">

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">ID товара *</label>
                    <input type="text"
                           name="item_id"
                           x-model="itemId"
                           @input="itemId = itemId.replace(/[^0-9 ]/g, ''); checkId()"
                           @blur="checkId()"
                           required
                           :class="idExists ? 'border-red-500 ring-2 ring-red-200' : 'border-gray-300'"
                           class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 bg-white text-gray-900"
                           placeholder="Только цифры">

                    <!-- ID validation feedback -->
                    <template x-if="isChecking">
                        <p class="text-xs text-gray-500 mt-1 flex items-center">
                            <i class="fas fa-spinner fa-spin mr-1"></i>Проверка...
                        </p>
                    </template>
                    <template x-if="!isChecking && itemId.replace(/\s/g, '') !== '' && idExists">
                        <p class="text-xs text-red-600 mt-1 flex items-center">
                            <i class="fas fa-times-circle mr-1"></i>
                            Занят: <span x-text="idExistsName"></span>
                        </p>
                    </template>
                    <template x-if="!isChecking && itemId.replace(/\s/g, '') !== '' && !idExists">
                        <p class="text-xs text-green-600 mt-1 flex items-center">
                            <i class="fas fa-check-circle mr-1"></i>Свободен
                        </p>
                    </template>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Название *</label>
                    <input type="text"
                           name="name"
                           required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 bg-white text-gray-900"
                           placeholder="Молоток">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Количество</label>
                    <input type="number"
                           name="quantity"
                           value="0"
                           min="0"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 bg-white text-gray-900">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Мин. остаток</label>
                    <input type="number"
                           name="min_stock"
                           value="1"
                           min="0"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 bg-white text-gray-900">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Категория</label>
                <input type="text"
                       name="category"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 bg-white text-gray-900"
                       placeholder="Инструменты, Расходники и т.д.">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Местоположение</label>
                <input type="text"
                       name="location"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 bg-white text-gray-900"
                       placeholder="Стеллаж A, Полка 3">
            </div>

            <div class="flex space-x-3 pt-2">
                <button type="submit"
                        :disabled="submitDisabled"
                        :class="submitDisabled ? 'bg-gray-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700'"
                        class="flex-1 px-4 py-2 text-white rounded-lg transition-colors">
                    <i class="fas fa-check mr-2"></i>Создать товар
                </button>
                <button type="button"
                        @click="open = false; setTimeout(() => $el.closest('.fixed').remove(), 300)"
                        class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                    Отмена
                </button>
            </div>
        </form>
    </div>
</div>
